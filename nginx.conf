# 快递查询 — 宝塔 Nginx 配置文件
# 部署路径：宝塔面板 → 网站 → ems.nova520.top → 配置文件
# 修改后执行：nginx -t && nginx -s reload

proxy_cache_path /www/dk_project/sites/ems.nova520.top/proxy_cache_dir levels=1:2 keys_zone=ems_nova520_top_cache:20m inactive=1d max_size=5g;

server {
    listen 80;
    listen 443 ssl http2 ;

    server_name ems.nova520.top ems.agety.cn;
    index index.php index.html index.htm default.php default.htm default.html;
    root /www/dk_project/wwwroot/ems.nova520.top;
    include /www/server/panel/vhost/nginx/extension/ems.nova520.top/*.conf;

    #CERT-APPLY-CHECK--START
    include /www/server/panel/vhost/nginx/well-known/ems.nova520.top.conf;
    #CERT-APPLY-CHECK--END

    #SSL-START
    ssl_certificate    /www/server/panel/vhost/cert/ems.nova520.top/fullchain.pem;
    ssl_certificate_key    /www/server/panel/vhost/cert/ems.nova520.top/privkey.pem;
    ssl_protocols TLSv1.1 TLSv1.2 TLSv1.3;
    ssl_ciphers EECDH+CHACHA20:EECDH+CHACHA20-draft:EECDH+AES128:RSA+AES128:EECDH+AES256:RSA+AES256:EECDH+3DES:RSA+3DES:!MD5;
    ssl_prefer_server_ciphers on;
    ssl_session_cache shared:SSL:10m;
    ssl_session_timeout 10m;
    add_header Strict-Transport-Security "max-age=31536000";
    error_page 497  https://$host$request_uri;
    #SSL-END

    #ERROR-PAGE-START
    error_page 404 /404.html;
    #ERROR-PAGE-END

    #PROXY-CONF-START
    location ^~ / {
      proxy_pass http://127.0.0.1:3014;
      proxy_set_header Host $http_host;
      proxy_set_header X-Real-IP $remote_addr;
      proxy_set_header X-Real-Port $remote_port;
      proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
      proxy_set_header X-Forwarded-Proto $scheme;
      proxy_set_header X-Forwarded-Host $host;
      proxy_set_header X-Forwarded-Port $server_port;
      proxy_set_header REMOTE-HOST $remote_addr;

      # 永久禁用缓存 — 解决 Cloudflare / 浏览器缓存旧 JS/CSS 导致白屏
      add_header Cache-Control "no-store, no-cache, must-revalidate, proxy-revalidate, max-age=0" always;
      add_header Pragma "no-cache" always;
      add_header Expires "0" always;
      add_header CDN-Cache-Control "no-store" always;

      proxy_buffering off;
      proxy_connect_timeout 60s;
      proxy_send_timeout 600s;
      proxy_read_timeout 600s;
      proxy_http_version 1.1;
      proxy_set_header Upgrade $http_upgrade;
      proxy_set_header Connection $connection_upgrade;
    }
    #PROXY-CONF-END

    #WEBSOCKET-SUPPORT START
    proxy_http_version 1.1;
    proxy_set_header Upgrade $http_upgrade;
    proxy_set_header Connection $connection_upgrade;
    #WEBSOCKET-SUPPORT END

    # 禁止访问的文件或目录
    location ~ ^/(\.user.ini|\.htaccess|\.git|\.env|\.svn|\.project|LICENSE|README.md)
    {
        return 404;
    }

    # 一键申请SSL证书验证目录相关设置
    location /.well-known{
        allow all;
    }

    # 禁止在证书验证目录放入敏感文件
    if ( $uri ~ "^/\.well-known/.*\.(php|jsp|py|js|css|lua|ts|go|zip|tar\.gz|rar|7z|sql|bak)$" ) {
        return 403;
    }

    access_log  /www/wwwlogs/ems.nova520.top.log;
    error_log  /www/wwwlogs/ems.nova520.top.error.log;
}
